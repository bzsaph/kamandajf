<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Member — J&F Smart Logistics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Urbanist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
:root{--primary:#0066FF;--primary-2:#00A8FF;--secondary:#FF6B35;--dark:#0F172A;--gray:#64748B;
  --grad-primary:linear-gradient(135deg,#0066FF 0%,#00A8FF 100%);--grad-dark:linear-gradient(150deg,#0F172A 0%,#13294B 60%,#0A1A33 100%);
  --ff:'Plus Jakarta Sans',sans-serif;--fd:'Urbanist',sans-serif;}
body{font-family:var(--ff);color:#334155;background:#fff;}
.tm-header{position:sticky;top:0;z-index:1030;background:#fff;box-shadow:0 4px 24px rgba(15,23,42,.07);}
.tm-header img{height:46px;}
.tm-header a.back{font-weight:700;color:var(--primary);}
.tm-hero{background:var(--grad-dark);color:#fff;padding:3.5rem 0;}
.tm-photo{width:200px;height:200px;border-radius:24px;object-fit:cover;box-shadow:0 24px 50px -16px rgba(0,0,0,.6);border:4px solid rgba(255,255,255,.12);}
.tm-name{font-family:var(--fd);font-weight:800;font-size:2.4rem;letter-spacing:-.01em;}
.tm-role{display:inline-block;background:var(--grad-primary);color:#fff;font-weight:700;font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;padding:.45rem 1rem;border-radius:30px;}
.tm-soc a{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.1);color:#fff;display:inline-flex;align-items:center;justify-content:center;margin-right:.5rem;font-size:1.1rem;transition:.2s;}
.tm-soc a:hover{background:var(--grad-primary);transform:translateY(-3px);}
.sec-t{font-family:var(--fd);font-weight:800;color:var(--dark);font-size:1.5rem;}
.resp{display:flex;gap:.8rem;align-items:flex-start;background:#f8fafc;border:1px solid #eef0f4;border-radius:14px;padding:1rem 1.1rem;height:100%;}
.resp .ic{width:40px;height:40px;border-radius:10px;background:#eaf2ff;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.resp h6{font-family:var(--fd);font-weight:700;color:var(--dark);margin:0 0 .15rem;font-size:.98rem;}
.resp p{margin:0;font-size:.85rem;color:var(--gray);}
.mate{display:block;background:#fff;border:1px solid #eef0f4;border-radius:16px;padding:1rem;text-align:center;transition:.2s;height:100%;}
.mate:hover{transform:translateY(-5px);box-shadow:0 18px 36px -16px rgba(15,23,42,.25);border-color:transparent;}
.mate img{width:72px;height:72px;border-radius:50%;object-fit:cover;margin-bottom:.6rem;}
.mate .nm{font-family:var(--fd);font-weight:700;color:var(--dark);font-size:.95rem;}
.mate .rl{font-size:.75rem;color:var(--primary);font-weight:600;}
.tm-foot{background:#0B1525;color:#9fb2cf;padding:2rem 0;font-size:.9rem;}
.tm-foot a{color:#fff;}
</style>
</head>
<body>

<header class="tm-header">
  <div class="container d-flex justify-content-between align-items-center py-2">
    <a href="index.html"><img src="images/logo.png" alt="J&F Smart Logistics Ltd"></a>
    <a class="back" href="index.html#team"><i class="bi bi-arrow-left me-1"></i> Back to Team</a>
  </div>
</header>

<section class="tm-hero">
  <div class="container">
    <div class="row align-items-center g-4">
      <div class="col-lg-3 col-md-4 text-center text-md-start">
        <img id="mPhoto" class="tm-photo" src="images/member-md.png" alt="">
      </div>
      <div class="col-lg-9 col-md-8">
        <span class="tm-role" id="mRole">Managing Director</span>
        <h1 class="tm-name mt-3 mb-2" id="mName">Member Name</h1>
        <p class="mb-3" id="mTagline" style="color:#dbe5f5;max-width:620px"></p>
        <div class="tm-soc">
          <a id="mMail" href="mailto:info@jfsmartlogistics.com"><i class="bi bi-envelope-fill"></i></a>
          <a href="#"><i class="bi bi-linkedin"></i></a>
          <a href="https://wa.me/250788351489" target="_blank"><i class="bi bi-whatsapp"></i></a>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="py-5">
  <div class="container">
    <div class="row g-5">
      <div class="col-lg-7">
        <h2 class="sec-t mb-3">About <span id="mFirst">the Member</span></h2>
        <div id="mBio" style="color:#475569;line-height:1.8"></div>
      </div>
      <div class="col-lg-5">
        <div class="bg-light rounded-4 p-4 border">
          <h2 class="sec-t mb-3" style="font-size:1.2rem">At a glance</h2>
          <p class="mb-2"><i class="bi bi-person-badge-fill text-primary me-2"></i><strong>Role:</strong> <span id="mRole2"></span></p>
          <p class="mb-2"><i class="bi bi-geo-alt-fill text-primary me-2"></i><strong>Based in:</strong> Kigali, Rwanda</p>
          <p class="mb-2"><i class="bi bi-envelope-fill text-primary me-2"></i><strong>Email:</strong> info@jfsmartlogistics.com</p>
          <p class="mb-0"><i class="bi bi-telephone-fill text-primary me-2"></i><strong>Phone:</strong> +250 788 351 489</p>
        </div>
      </div>
    </div>

    <h2 class="sec-t mt-5 mb-3">Key Responsibilities</h2>
    <div class="row g-3" id="mResp"></div>

    <h2 class="sec-t mt-5 mb-3">Meet the Rest of the Team</h2>
    <div class="row g-3" id="mMates"></div>
  </div>
</section>

<footer class="tm-foot">
  <div class="container d-flex justify-content-between flex-wrap">
    <span>&copy; 2026 J&F Smart Logistics Ltd. All rights reserved.</span>
    <span><a href="index.html">Main Site</a> · <a href="corporate.html">Enterprise</a> · <a href="index.html#team">Team</a></span>
  </div>
</footer>

<script>
const MEMBERS = {
  md:   {name:"Kamanda Justus", role:"Managing Director (MD)", photo:"images/member-md.png",
         tagline:"Founder & Managing Director driving J&F's vision of comfort-first mobility and travel.",
         bio:["Kamanda Justus is the founder and Managing Director of J&F Smart Logistics Ltd. With years of leadership in mobility, travel and tourism, he sets the strategic direction of the company and champions a culture of service excellence.",
              "He works closely with clients, partners and the leadership team to ensure every journey J&F delivers reflects the company's promise: comfort, class and care."],
         resp:[["bi-compass","Strategy & Vision","Sets the company's long-term direction and goals."],
               ["bi-people-fill","Partnerships","Builds relationships with clients, hotels and institutions."],
               ["bi-graph-up-arrow","Growth","Drives expansion across Rwanda and East Africa."],
               ["bi-stars","Service Excellence","Upholds the highest standards on every trip."]]},
  cto:  {name:"Bazimya Saphani", role:"Director of IT", photo:"images/member-cto.png",
         tagline:"Leads technology and innovation — the digital backbone of every J&F journey.",
         bio:["Bazimya Saphani leads technology and innovation at J&F Smart Logistics, building the digital booking, tracking and fleet-management systems that keep every journey smooth and transparent.",
              "He ensures the company stays ahead with secure, reliable and user-friendly technology for both customers and the operations team."],
         resp:[["bi-phone","Booking & Tracking","Builds the platforms clients use to book and track."],
               ["bi-cpu-fill","Fleet Telematics","Connects vehicles with real-time data."],
               ["bi-shield-lock-fill","Security","Protects systems and customer data."],
               ["bi-stars","Digital Experience","Improves the online customer journey."]]},
  daf:  {name:"Sumwiza Faith", role:"Director of Admin & Finance (DAF)", photo:"images/member-daf.png",
         tagline:"Oversees finance and administration — keeping J&F efficient, transparent and sustainable.",
         bio:["Sumwiza Faith oversees administration and finance at J&F Smart Logistics, ensuring the company runs efficiently, transparently and sustainably.",
              "She manages budgets, compliance and reporting, delivering value for clients and partners while supporting the wider team."],
         resp:[["bi-cash-coin","Finance","Planning, budgeting and reporting."],
               ["bi-file-earmark-check-fill","Compliance","Keeps the company compliant and audit-ready."],
               ["bi-cart-check-fill","Procurement","Manages purchasing and supplier value."],
               ["bi-people-fill","HR Support","Supports recruitment and staff welfare."]]},
  ops:  {name:"Mucyo Joas", role:"Operations Manager", photo:"images/member-ops.png",
         tagline:"Runs day-to-day operations so every client enjoys punctual, reliable service.",
         bio:["Mucyo Yowasi manages day-to-day operations at J&F Smart Logistics, coordinating drivers, schedules and bookings so every client experiences punctual, dependable service.",
              "He is the engine room of the business — turning bookings into smooth, on-time journeys."],
         resp:[["bi-diagram-3-fill","Dispatch","Coordinates daily trips and routing."],
               ["bi-person-vcard-fill","Driver Coordination","Schedules and supports chauffeurs."],
               ["bi-clipboard-check-fill","Quality Control","Monitors and improves service quality."],
               ["bi-calendar2-check-fill","Scheduling","Manages client bookings and timing."]]},
  fleet:{name:"Karuhanga Josam", role:"Fleet Manager", photo:"images/member-fleet.png",
         tagline:"Keeps every vehicle safe, clean, insured and road-ready for a premium experience.",
         bio:["Karuhanga Josamu manages the J&F fleet, keeping every vehicle safe, clean, insured and road-ready.",
              "From maintenance to compliance, he ensures the fleet always delivers comfort and reliability."],
         resp:[["bi-tools","Maintenance","Keeps vehicles serviced and road-ready."],
               ["bi-shield-check","Safety & Insurance","Ensures full insurance and safety."],
               ["bi-car-front-fill","Acquisition","Manages the vehicle fleet and upgrades."],
               ["bi-clipboard2-check-fill","Inspections","Runs regular checks and compliance."]]}
};
const ORDER = ["md","cto","daf","ops","fleet"];

function getId(){
  const p = new URLSearchParams(location.search).get('id');
  return MEMBERS[p] ? p : 'md';
}
const id = getId();
const m = MEMBERS[id];
document.title = m.name + " — J&F Smart Logistics";
document.getElementById('mPhoto').src = m.photo;
document.getElementById('mPhoto').alt = m.name;
document.getElementById('mName').textContent = m.name;
document.getElementById('mRole').textContent = m.role;
document.getElementById('mRole2').textContent = m.role;
document.getElementById('mTagline').textContent = m.tagline;
document.getElementById('mFirst').textContent = m.name.split(' ')[0];
document.getElementById('mBio').innerHTML = m.bio.map(p=>'<p>'+p+'</p>').join('');
document.getElementById('mResp').innerHTML = m.resp.map(r=>
  '<div class="col-md-6"><div class="resp"><div class="ic"><i class="bi '+r[0]+'"></i></div><div><h6>'+r[1]+'</h6><p>'+r[2]+'</p></div></div></div>').join('');
document.getElementById('mMates').innerHTML = ORDER.filter(k=>k!==id).map(k=>{
  const o=MEMBERS[k];
  return '<div class="col-6 col-lg-3"><a class="mate" href="team-member.html?id='+k+'"><img src="'+o.photo+'" alt="'+o.name+'"><div class="nm">'+o.name+'</div><div class="rl">'+o.role+'</div></a></div>';
}).join('');
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
